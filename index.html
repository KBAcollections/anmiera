<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmiera Perfume</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:#fff;
font-family:Arial;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
position:fixed;
width:100%;
top:0;
z-index:10;
background:#0a0a0a;
}

.nav img{
height:45px;
cursor:pointer;
}

.nav a{
color:gold;
text-decoration:none;
margin-left:10px;
border:1px solid gold;
padding:6px 10px;
font-size:14px;
}

/* HERO SLIDER FIXED */
.hero{
width:100%;
height:100vh;   /* FULL SCREEN */
position:relative;
overflow:hidden;
margin-top:70px; /* space for nav */
}

.slide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1.2s ease-in-out;
}

.slide.active{
opacity:1;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* TEXT */
.overlay h1{
font-size:40px;
letter-spacing:2px;
margin:10px 0;
}

.overlay p{
color:#ddd;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:1px solid gold;
background:transparent;
color:gold;
cursor:pointer;
font-size:14px;
}

button:hover{
background:gold;
color:#000;
}

</style>

</head>

<body>

<!-- NAV -->
<div class="nav">

    <a href="index.html">
        <img src="logo.png">
    </a>

    <div>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="products.html#cart">Cart</a>
        <a href="https://www.facebook.com/anmieraperfume/" target="_blank">Facebook</a>
    </div>

</div>

<!-- HERO SLIDER -->
<div class="hero">

    <!-- SLIDE 1 -->
    <div class="slide active" style="background-image:url('hero.jpg')">
        <div class="overlay">
            <img src="logo.png" style="height:70px;margin-bottom:10px;">
            <h1>ANMIERA PERFUME</h1>
            <p>Luxury Inspired Fragrance Collection</p>
            <a href="products.html"><button>Shop Now</button></a>
        </div>
    </div>

    <!-- SLIDE 2 -->
    <div class="slide" style="background-image:url('lifestyle.jpg')">
        <div class="overlay">
            <h1>Elegance in Every Spray</h1>
        </div>
    </div>

    <!-- SLIDE 3 -->
    <div class="slide" style="background-image:url('promo.jpg')">
        <div class="overlay">
            <h1>Affordable Luxury ₱299</h1>
        </div>
    </div>

</div>

<!-- SLIDER SCRIPT -->
<script>

let slides = document.querySelectorAll(".slide");
let current = 0;

setInterval(() => {

slides[current].classList.remove("active");
current = (current + 1) % slides.length;
slides[current].classList.add("active");

}, 4000);

</script>

</body>
</html>
