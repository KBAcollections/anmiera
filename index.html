<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmiera Perfume Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    background: #0a0a0a;
    color: #eaeaea;
    font-family: 'Inter', sans-serif;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    border-bottom: 1px solid #222;
}

.nav img {
    height: 45px;
}

.cart-btn {
    border: 1px solid gold;
    padding: 8px 15px;
    color: gold;
    cursor: pointer;
}

/* HERO SLIDER */
.slider {
    position: relative;
    height: 90vh;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.overlay h1 {
    font-family: 'Playfair Display', serif;
    font-size: 55px;
    letter-spacing: 5px;
}

/* PRODUCTS */
.section {
    padding: 80px 40px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 240px;
    border: 1px solid #222;
    padding: 15px;
    transition: 0.3s;
}

.card:hover {
    border-color: gold;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.price {
    color: gold;
    margin: 8px 0;
}

/* BUTTONS */
button {
    background: transparent;
    border: 1px solid gold;
    color: gold;
    padding: 8px 12px;
    cursor: pointer;
}

button:hover {
    background: gold;
    color: black;
}

/* CART */
.cart {
    position: fixed;
    right: -350px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #111;
    padding: 20px;
    transition: 0.3s;
    border-left: 1px solid #333;
}

.cart.open {
    right: 0;
}

.checkout a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid gold;
    color: gold;
    text-decoration: none;
    text-align: center;
}

/* FOOTER */
.footer {
    padding: 30px;
    text-align: center;
    border-top: 1px solid #222;
    color: #777;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <img src="logo.png">
    <div class="cart-btn" onclick="toggleCart()">Cart 🛒 (<span id="count">0</span>)</div>
</div>

<!-- SLIDER -->
<div class="slider">

    <div class="slide active" style="background-image:url('hero.jpg')">
        <div class="overlay">
            <img src="logo.png" style="height:80px;">
            <h1>ANMIERA</h1>
            <p>Luxury-inspired fragrance. Affordable elegance.</p>
        </div>
    </div>

    <div class="slide" style="background-image:url('lifestyle.jpg')">
        <div class="overlay">
            <h1>Timeless Elegance</h1>
            <p>Designed for everyday confidence</p>
        </div>
    </div>

    <div class="slide" style="background-image:url('promo.jpg')">
        <div class="overlay">
            <h1>₱299 | 50mL</h1>
            <p>Signature Collection</p>
        </div>
    </div>

</div>

<!-- PRODUCTS -->
<div class="section">
    <h2>Signature Collection</h2>

    <div class="products">

        <div class="card">
            <img src="bottle.jpg">
            <h3>Anmiera Signature</h3>
            <div class="price">₱299 | 50mL</div>
            <button onclick="buyNow('Anmiera Signature')">Buy Now</button>
            <button onclick="addToCart('Anmiera Signature')">Add to Cart</button>
        </div>

    </div>
</div>

<!-- CART -->
<div class="cart" id="cart">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>

    <div class="checkout">

        <a href="#" onclick="checkoutCart()">Checkout via WhatsApp</a>

        <a href="https://www.facebook.com/anmieraperfume/" target="_blank">
            Order via Facebook
        </a>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Anmiera Perfume
</div>

<script>

let cart = [];

function buyNow(product) {
    let phone = "639952525228";

    let message = `Hi! I want to order:

🧴 Product: ${product}
💰 Price: ₱299
📦 Size: 50mL`;

    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message), "_blank");
}

function addToCart(item) {
    cart.push(item);
    document.getElementById("count").innerText = cart.length;

    let list = document.getElementById("cartItems");
    list.innerHTML = cart.map(i => "• " + i).join("<br>");
}

function checkoutCart() {
    let phone = "639952525228";

    let message = "Hi! I want to order:\n\n";

    cart.forEach((item, i) => {
        message += (i+1) + ". " + item + " (₱299)\n";
    });

    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message), "_blank");
}

function toggleCart() {
    document.getElementById("cart").classList.toggle("open");
}

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
    index = (index + 1) % slides.length;
}, 4000);

</script>

</body>
</html>
