<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial;}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
}

.nav img{height:45px;cursor:pointer;}

.nav a{
color:gold;
text-decoration:none;
margin-left:10px;
border:1px solid gold;
padding:6px 10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#111;
border:1px solid #222;
padding:15px;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

button{
width:100%;
padding:10px;
border:1px solid gold;
background:transparent;
color:gold;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
}

.cart.open{right:0;}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="index.html"><img src="logo.png"></a>

    <div>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="javascript:void(0)" onclick="toggleCart()">Cart 🛒</a>
        <a href="https://www.facebook.com/anmieraperfume/" target="_blank">Facebook</a>
    </div>
</div>

<h2 style="text-align:center;">Available Scents</h2>
<p style="text-align:center;">₱299 | 50mL</p>

<div class="products">

<div class="card"><img src="bottle.jpg"><h3>Happy Bloom</h3><button onclick="add('Happy Bloom')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Libre Muse</h3><button onclick="add('Libre Muse')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Valaya Essence</h3><button onclick="add('Valaya Essence')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Cloud Touch</h3><button onclick="add('Cloud Touch')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Meow Bliss</h3><button onclick="add('Meow Bliss')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Rouge Aura</h3><button onclick="add('Rouge Aura')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Coco Elegance</h3><button onclick="add('Coco Elegance')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Good Girl Noir</h3><button onclick="add('Good Girl Noir')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Lacoste Black</h3><button onclick="add('Lacoste Black')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Lacoste White</h3><button onclick="add('Lacoste White')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Lacoste Red</h3><button onclick="add('Lacoste Red')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Dylan Purple</h3><button onclick="add('Dylan Purple')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Pear Essence</h3><button onclick="add('Pear Essence')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Polo Sport</h3><button onclick="add('Polo Sport')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Eros Flame</h3><button onclick="add('Eros Flame')">Add to Cart</button></div>
<div class="card"><img src="bottle.jpg"><h3>Amethyste Glow</h3><button onclick="add('Amethyste Glow')">Add to Cart</button></div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="items"></div>
</div>

<script>

let cart=[];

function add(name){
cart.push(name);
update();
}

function update(){
let items=document.getElementById("items");
items.innerHTML="";
cart.forEach((c,i)=>{
items.innerHTML+=`<p>${i+1}. ${c}</p>`;
});
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

</script>

</body>
</html>
